<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes customizadas</title>
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap');

        @font-face {
            font-family:'bruxa';
            src: url(fonts/halloween_4/halloween.woff2),
                 url(fonts/halloween_4/halloween.otf), 
                 url(fonts/halloween_4/halloween.ttf), 
                 url(fonts/halloween_4/halloween\ black.otf);
        }
        h1 {
            font-family:'bruxa' Arial, Helvetica, sans-serif;
        }

        h2 {
             font-family: "Oswald", sans-serif;
             font-size: 4em;
        }
    </style>
</head>
<body>
    
    <h1>Feliz Halloween</h1>

    <h2>Feliz natal!!!</h2>
</body>
</html>
