<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EM e REM</title>
    <style>
        
        html {
            font-size: 16px;
        }
        p {
            font-size: 2em;
        }
        .caixa-pequena {
            border: 3px solid black;
            font-size: 32px;
        }

        .caixa-grande {
            border: 3px solid black;
            font-size: 16px;
        }

        .um-em {
            font-size: 1em;
        }

        .dois-em {
            font-size: 2em;
        }

        .tres.em {
            font-size: 3em;
        }

        .em {
            font-size: 1em;
        }
        .rem {
            font-size: 1rem;
        }
        .porcentagem {
            font-size: 100%;
        }

        #area {
            border: 3px solid black;
            width: 500px;
            font-size: 32px;
        }

    </style>
</head>
<body>

    <p class="em">EM</p>
    <p class="rem">REM</p>
    <p class="porcentagem">PORCENTAGEM</p>

    <hr>

    <div id="area">

        <p class="em">EM</p>
        <p class="rem">REM</p>
        <p class="porcentagem">PORCENTAGEM</p>

    </div>
