<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porcentagem e pixel</title>
    <style>

        /*body {
            border: 3px solid purple;
        }*/

        #area {
            border: 3px solid black;
            width: 500px;
        }
        .pixel {
            border: 1px solid black;
            background-color: red;
            padding: 8px;
            width: 200px;
            
        }

        .Porcentagem {
             border: 1px solid black;
            background-color: red;
            padding: 8px;
            width: 50%;
        }

    </style>
</head>
<body>
    <div class="pixel">Pixel é uma medida absoluta</div>
    <div class="Porcentagem">Porcentagem(50%)</div>

    <hr>

    <div id="area">
         <div class="pixel">
        <span>Pixel é uma medida absoluta</span>
    </div>
    <div class="Porcentagem">Porcentagem (50%)</div>

    </div>



    
</body>
</html>
