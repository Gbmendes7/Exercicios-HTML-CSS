<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bordas</title>
    <style>
        h1 {
            background-color: darkorange;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            border-bottom: 4px dotted;
            padding: 8px;
            

        }

        p {

            background-color: blueviolet;
            border-left: 12px solid darkslateblue;
            border-right: 12px solid darkslateblue;
            padding: 10px;
            border-radius: 20px;
           
        }

    </style>
</head>
<body>
    <h1>Modelo de caixa</h1>
   
    <p>
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Nisi sequi eligendi quis id! Inventore illo eius harum, doloremque iste sed vero consectetur. Architecto aperiam qui recusandae suscipit ullam ratione! Consequatur.
    </p>
    
</body>
</html>
