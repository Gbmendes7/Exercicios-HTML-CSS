<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>

    <!--
      <script src="https://unpkg.com/@codans/trello"></script>
    -->
      

</head>
<body>
  <img src="img/trello.svg" alt="Logo trelo" width="200">
  <h1>Fazer login no Trello</h1>


  <form action="" method="get">
    <input type="text" name="email" id="email" placeholder="Insira o e-mail">
    <br>
    <input type="password" name="senha" id="senha" placeholder="Insira a senha">
    <br>
    <input type="submit" value="Fazer login">

    <br><br>

     <span>Ou</span>
    
     <br><br>
  

  <button> <img src="img/google.svg" alt="logo Google" width="20">Continuar com o Google</button>
  
  <br><br>

  <button> <img src="img/microsoft.svg" alt="Logo microsoft" width="20">Continuar com a Microsoft</button>

  <br><br>

  <button><img src="img/apple.svg" alt="Logo apple" width="20">Continuar com a Apple</button>

  <br><br>

  <button><img src="img/slack.svg" alt="Logo slack" width="20">Continuar com Slack</button>

  
</form>

  <img src="img/atlassian.svg" alt=" Logo atlassian" width="200">
  <img src="img/analytics.svg" alt="logo analytics" width="200">
  <img src="img/interactive.svg"  alt="logo interactive" width="200">


  

</body>
</html>
