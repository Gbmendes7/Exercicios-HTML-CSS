<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Países Mais Populosos</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        thead {
            background-color: lightgray;
        }

        tbody {
            background-color: white;
        }

        caption {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <table>
        <caption>Países Mais Populosos do Mundo</caption>

        <thead>
            <tr>
                <th>Posição</th>
                <th>País</th>
                <th>População Aproximada (milhões)</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>1</td>
                <td>Índia</td>
                <td>1,46 bilhão</td>
            </tr>

            <tr>
                <td>2</td>
                <td>China</td>
                <td>1,41 bilhão</td>
            </tr>

            <tr>
                <td>3</td>
                <td>Estados Unidos</td>
                <td>347 milhões</td>
            </tr>

            <tr>
                <td>4</td>
                <td>Indonésia</td>
                <td>286 milhões</td>
            </tr>

            <tr>
                <td>5</td>
                <td>Paquistão</td>
                <td>255 milhões</td>
            </tr>

            <tr>
                <td>6</td>
                <td>Nigéria</td>
                <td>238 milhões</td>
            </tr>

            <tr>
                <td>7</td>
                <td>Brasil</td>
                <td>212 milhões</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="3">Fonte: fictício.com.br</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
