<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios de formulários</title>
</head>
<body>
    <h1>Exercício de formulários</h1>
    <form action="processa.html" method="get">
        <fieldset>
            <legend>Dados pessoais</legend>
            <label for="nome">Nome</label><br>
            <input type="text" name="nome" id="nome" placeholder="Digite seu nome"><br>
            <label for="email">Email</label><br>
            <input type="text" name="email" id="email" placeholder="Digite seu email"><br>
            <input type="checkbox" name="notificação" id="not">
            <label for="not">Quero receber E-mail</label><br><br>
            <label for="senha">Senha</label><br>
            <input type="password" name="senha" id="senha" placeholder="Digite sua senha">
        </fieldset>

        <fieldset>
            <legend>Informações adicionais</legend>
            <input type="radio" name="pessoa" value="PF" id="pf">
            <label for="pf">Pessoa Física</label>
            <input type="radio" name="pessoa" value="PJ" id="pj">
            <label for="pj">Pessoa Jurídica</label>
        </fieldset>
        <br>

        <input type="submit" value="Cadastrar">
    </form>
    
</body>
</html>
