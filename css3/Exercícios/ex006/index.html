<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-classe exercício</title>

    <style>
        a {
            color:blueviolet;
            padding: 0.5em 1em;
            text-decoration: none;

        
        }

        a:hover {
            background:blueviolet ;
            color: white;
        }

        a:active {
            color: lightblue;
        }

        
    </style>

</head>
<body>
    
    <a target="_blank" href="https://www.google.com/">Home</a> |
    <a target="_blank" href="https://www.google.com/">Sobre</a> |
    <a target="_blank" href="https://www.google.com/">Empresa</a> |
    <a target="_blank" href="https://www.google.com/">Produtos</a> |
    <a target="_blank" href="https://www.google.com/">Contato</a>

</body>
</html>
